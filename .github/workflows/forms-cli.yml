name: "Test Forms Cli"
on:
  push:
    branches: [forms_cli]
    paths:
      - "support/forms-cli/**"
      - ".github/workflows/forms-cli.yml"
  pull_request:
    branches: [main]
    paths:
      - "support/forms-cli/**"
  merge_group:
    types: [checks_requested]
jobs:
  build_and_test:
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: support/forms-cli
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Determine Ruby version
        id: determine-ruby-version
        run: |
          echo "RUBY_VERSION=$(cat ../../.ruby-version)" >> "$GITHUB_OUTPUT"
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          bundler-cache: true
          ruby-version: ${{steps.determine-ruby-version.outputs.RUBY_VERSION}}
          working-directory: support/forms-cli
      - name: Run forms CLI tests
        run: bundle exec rspec
